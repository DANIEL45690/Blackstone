# P2P Security System Configuration
# =================================

[system]
version = 5.1.2
log_level = INFO
log_file = logs/p2p_system.log
console_output = true

[network]
proxy_port = 8888
control_port = 9999
max_nodes = 16
max_threads = 64
heartbeat_interval = 5000
connection_timeout = 30000

[p2p]
handshake_timeout = 10000
max_packet_size = 65536
enable_routing = true
enable_nat_traversal = false

[security]
enable_firewall = true
enable_auth = true
enable_ratelimit = true
max_connections_per_ip = 100
request_window_ms = 60000
max_requests_per_window = 1000

[proxy]
enabled = true
listen_port = 8888
max_clients = 100
timeout = 30000
buffer_size = 8192 
